name: OpenCleaner
options:
  bundleIdPrefix: com.vibelab
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  OpenCleanerClient:
    path: Packages/OpenCleanerClient
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  OpenCleaner:
    type: application
    platform: macOS
    sources:
      - path: OpenCleaner
        excludes:
          - "*.entitlements"
    dependencies:
      - package: OpenCleanerClient
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelab.opencleaner
        INFOPLIST_KEY_CFBundleDisplayName: OpenCleaner
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2025 VibeLab. All rights reserved."
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_ENTITLEMENTS: OpenCleaner/OpenCleaner.entitlements
        INFOPLIST_KEY_SUFeedURL: "https://opencleanerapp.github.io/OpenCleaner/appcast.xml"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: true
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: OpenCleaner/OpenCleaner.entitlements

  OpenCleanerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenCleanerTests
    dependencies:
      - target: OpenCleaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelab.opencleaner.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  OpenCleaner:
    build:
      targets:
        OpenCleaner: all
        OpenCleanerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpenCleanerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
