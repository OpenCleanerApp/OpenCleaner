name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Test
        run: go test ./...
        working-directory: go

      - name: Vet
        run: go vet ./...
        working-directory: go

      - name: Build CLI
        run: go build -o /dev/null ./cmd/opencleaner
        working-directory: go

      - name: Build Daemon
        run: go build -o /dev/null ./cmd/opencleanerd
        working-directory: go

  swift-build:
    name: Swift Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme OpenCleaner

      - name: Build
        run: |
          xcodebuild build \
            -scheme OpenCleaner \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -scheme OpenCleaner \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/TestResults.xcresult
